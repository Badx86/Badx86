name: Update Stepik Activity

on:
  schedule:
    # каждый день в 03:17 UTC (~07:17 Ереван)
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/stepik_activity.py"
      - ".github/workflows/stepik-activity.yml"

concurrency:
  group: stepik-activity
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      STEPIK_USER_ID: "457012701"
      # раскомментируй, если user-activities отдаёт 401/403 анонимно
      # STEPIK_CLIENT_ID: ${{ secrets.STEPIK_CLIENT_ID }}
      # STEPIK_CLIENT_SECRET: ${{ secrets.STEPIK_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render dark theme
        run: |
          python scripts/stepik_activity.py \
            --user-id "$STEPIK_USER_ID" \
            --theme dark \
            --output assets/stepik-activity-dark.svg

      - name: Render light theme
        run: |
          python scripts/stepik_activity.py \
            --user-id "$STEPIK_USER_ID" \
            --theme light \
            --output assets/stepik-activity-light.svg

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stepik-activity-*.svg
          if git diff --cached --quiet; then
            echo "Нечего коммитить"
          else
            git commit -m "chore(stepik): refresh activity heatmap $(date -u +%F)"
            git push
          fi
